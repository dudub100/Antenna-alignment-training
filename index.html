<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RF Antenna Alignment Emulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --bg: #f8f9fa;
            --text: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0; padding: 15px; background-color: var(--bg); color: var(--text); user-select: none;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; }
        
        .panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.9rem;}
        input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white;}
        button.primary { background-color: var(--primary); }
        button.success { background-color: var(--success); }
        button.dark { background-color: #333; }
        button.danger { background-color: var(--danger); }
        button:active { opacity: 0.8; }

        .dashboard { display: none; grid-template-columns: 1fr 1fr; gap: 15px; }
        .metric-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .metric-card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #666; text-transform: uppercase;}
        .metric-value { font-size: 1.5rem; font-weight: bold; }
        
        .rsl-card { grid-column: 1 / -1; background-color: #333; color: white; }
        .rsl-card h3 { color: #aaa; }
        .rsl-value { font-size: 3rem; color: var(--success); }
        
        .full-width { grid-column: 1 / -1; }
        .btn-group { display: flex; gap: 10px; }
        
        .chart-container { position: relative; height: 30vh; width: 100%; margin-top: 15px;}
    </style>
</head>
<body>

<div class="container">
    <h1>📡 RF Alignment Emulator</h1>

    <div class="panel" id="setupPanel">
        <div class="input-group">
            <label>Frequency (GHz):</label>
            <input type="number" id="inFreq" value="11.0" step="0.1" min="1">
        </div>
        <div class="input-group">
            <label>Antenna Diameter (Feet):</label>
            <input type="number" id="inDiameter" value="4.0" step="0.5" min="0.5">
        </div>
        <button class="success" id="btnPermissions">Start Sensors</button>
        <button class="primary" id="btnRandomizeTarget" style="display:none;">Set New Targets (Az & El)</button>
    </div>

    <div class="dashboard" id="mainDashboard">
        
        <div class="metric-card rsl-card">
            <h3>Emulated RSL</h3>
            <div class="rsl-value"><span id="outRsl">--</span> dBm</div>
            <div>Attenuation: <span id="outAtten">--</span> dB</div>
        </div>

        <div class="metric-card full-width">
            <h3>Targets</h3>
            <div class="metric-value" style="color: var(--primary);">
                Azimuth: <span id="outTargetAz">--</span>° | Elev: <span id="outTargetEl">--</span>°
            </div>
        </div>

        <div class="metric-card">
            <h3>Azimuth (Yaw)</h3>
            <div class="metric-value"><span id="outYaw">--</span>°</div>
        </div>
        <div class="metric-card">
            <h3>Elevation (Pitch)</h3>
            <div class="metric-value"><span id="outPitch">--</span>°</div>
        </div>

        <div class="full-width btn-group">
            <button class="dark" id="btnZero">🎯 ZERO GYRO</button>
            <button class="danger" id="btnStop">⏹ STOP</button>
        </div>

        <div class="panel full-width">
            <div class="input-group">
                <label>Graph View:</label>
                <select id="graphMode">
                    <option value="azimuth">RSL vs Azimuth</option>
                    <option value="elevation">RSL vs Elevation</option>
                </select>
            </div>
            <button class="dark" id="btnClearGraph" style="margin-bottom: 0;">🗑 Clear Graph Points</button>
            <div class="chart-container">
                <canvas id="rslChart"></canvas>
            </div>
        </div>
        
    </div>
</div>

<script>
    const BASE_RSL = -30.0; 
    let rslChart = null;
    let lastChartUpdate = 0;

    let historyAz = [];
    let historyEl = [];
    const MAX_HISTORY = 200; 

    let state = {
        sensorsActive: false,
        isFirstStart: true,
        targetAz: 0,
        targetEl: 0,
        raw: { az: 0, el: 0 },
        offsets: { az: 0, el: 0 },
        calibrated: { az: 0, el: 0 },
        currentAtten: 0
    };

    const els = {
        inFreq: document.getElementById('inFreq'),
        inDiameter: document.getElementById('inDiameter'),
        btnPermissions: document.getElementById('btnPermissions'),
        btnRandomizeTarget: document.getElementById('btnRandomizeTarget'),
        btnZero: document.getElementById('btnZero'),
        btnStop: document.getElementById('btnStop'),
        btnClearGraph: document.getElementById('btnClearGraph'),
        dashboard: document.getElementById('mainDashboard'),
        outRsl: document.getElementById('outRsl'),
        outAtten: document.getElementById('outAtten'),
        outTargetAz: document.getElementById('outTargetAz'),
        outTargetEl: document.getElementById('outTargetEl'),
        outYaw: document.getElementById('outYaw'),
        outPitch: document.getElementById('outPitch'),
        graphMode: document.getElementById('graphMode')
    };

    // --- Math & Vector Functions ---
    function j1(x) {
        let ax = Math.abs(x), y, ans1, ans2;
        if (ax < 8.0) {
            y = x * x;
            ans1 = x * (72362614232.0 + y * (-7895059235.0 + y * (242396853.1 + y * (-2972611.439 + y * (15704.48260 + y * (-30.16036606))))));
            ans2 = 144725228464.0 + y * (2300535178.0 + y * (18583304.74 + y * (99447.43394 + y * (376.9996644 + y * 1.0))));
            return ans1 / ans2;
        } else {
            let z = 8.0 / ax; y = z * z; let xx = ax - 2.356194491;
            ans1 = 1.0 + y * (0.183105e-2 + y * (-0.3516396491e-4 + y * (0.2457520174e-5 + y * (-0.240337019e-6))));
            ans2 = 0.04687499995 + y * (-0.2002690873e-3 + y * (0.8449199096e-5 + y * (-0.88228987e-6 + y * (0.105787412e-6))));
            return Math.sqrt(0.636619772 / ax) * (Math.cos(xx) * ans1 - z * Math.sin(xx) * ans2);
        }
    }

    function normalizeAz(angle) {
        let a = angle % 360;
        return a < 0 ? a + 360 : a;
    }

    function angularDist(a1, a2) {
        let diff = (a1 - a2) % 360;
        if (diff > 180) diff -= 360;
        if (diff < -180) diff += 360;
        return diff;
    }

    function calcPatternAtten(offAxisDeg) {
        const freqGhz = parseFloat(els.inFreq.value);
        const radiusM = (parseFloat(els.inDiameter.value) * 0.3048) / 2;
        const lambda = 3e8 / (freqGhz * 1e9);
        const k = (2 * Math.PI) / lambda;
        
        const thetaRad = Math.abs(offAxisDeg) * (Math.PI / 180);
        if (thetaRad === 0) return 0.0;
        
        const x = k * radiusM * Math.sin(thetaRad);
        if (x === 0) return 0.0;
        
        const gainFactor = (2 * j1(x)) / x;
        if (Math.abs(gainFactor) < 1e-9) return -100.0;
        return 20 * Math.log10(Math.abs(gainFactor));
    }

    // NEW: Converts erratic Euler angles into stable 3D vectors
    function getStableAngles(alpha, beta, gamma) {
        const d2r = Math.PI / 180;
        const r2d = 180 / Math.PI;

        const a = (alpha || 0) * d2r;
        const b = (beta || 0) * d2r;
        const g = (gamma || 0) * d2r;

        const ca = Math.cos(a), sa = Math.sin(a);
        const cb = Math.cos(b), sb = Math.sin(b);
        const cg = Math.cos(g), sg = Math.sin(g);

        // Project the device's back camera into Earth's 3D coordinate space
        const vx = -(ca * sg + sa * sb * cg); // East/West
        const vy = -(sa * sg - ca * sb * cg); // North/South
        const vz = -(cb * cg);                // Up/Down

        // Extract stable Azimuth and Elevation from the 3D vector
        let el = Math.asin(Math.max(-1, Math.min(1, vz))) * r2d;
        let az = Math.atan2(vx, vy) * r2d;

        return { az: (az + 360) % 360, el: el };
    }

    function clearGraphHistory() {
        historyAz = [];
        historyEl = [];
        updateChartDisplayMode();
    }

    function setRandomTargets() {
        state.targetAz = Math.random() * 10 + 85; 
        state.targetEl = Math.random() * 10 + 85;
        els.outTargetAz.textContent = state.targetAz.toFixed(1);
        els.outTargetEl.textContent = state.targetEl.toFixed(1);
        clearGraphHistory();
    }

    // --- Chart Logic ---
    function initChart() {
        if (rslChart) rslChart.destroy();

        const ctx = document.getElementById('rslChart').getContext('2d');
        rslChart = new Chart(ctx, {
            type: 'scatter', 
            data: {
                datasets: [
                    {
                        label: 'History Trail',
                        data: [], 
                        backgroundColor: 'black',
                        pointRadius: 2,
                        pointHoverRadius: 4
                    },
                    {
                        label: 'Current Position',
                        data: [], 
                        backgroundColor: '#dc3545',
                        borderColor: 'white',
                        borderWidth: 2,
                        pointRadius: 8,
                        pointHoverRadius: 10
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 }, 
                scales: {
                    x: { 
                        type: 'linear', 
                        title: { display: true, text: 'Angle (°)' },
                        min: 80,  // Locked Minimum
                        max: 100  // Locked Maximum
                    },
                    y: { 
                        title: { display: true, text: 'RSL (dBm)' }, 
                        max: -25, 
                        min: -100 
                    }
                }
            }
        });
    }

    function updateChartDisplayMode() {
        if (!rslChart) return;
        const mode = els.graphMode.value;
        rslChart.options.scales.x.title.text = mode === 'azimuth' ? 'Azimuth (°)' : 'Elevation (°)';
        rslChart.data.datasets[0].data = mode === 'azimuth' ? historyAz : historyEl;
        rslChart.update();
    }

    // --- Main Loop ---
    function updateDashboard() {
        if (!state.sensorsActive) return;

        state.calibrated.az = normalizeAz(state.raw.az + state.offsets.az);
        state.calibrated.el = normalizeAz(state.raw.el + state.offsets.el);

        els.outYaw.textContent = state.calibrated.az.toFixed(1);
        els.outPitch.textContent = state.calibrated.el.toFixed(1);

        let dAz = angularDist(state.calibrated.az, state.targetAz);
        let dEl = angularDist(state.calibrated.el, state.targetEl);
        let theta2D = Math.sqrt(dAz*dAz + dEl*dEl); 
        
        state.currentAtten = calcPatternAtten(theta2D);
        let rsl = BASE_RSL + state.currentAtten;

        els.outRsl.textContent = rsl.toFixed(1);
        els.outAtten.textContent = state.currentAtten.toFixed(1);

        if (state.currentAtten > -3) els.outRsl.style.color = 'var(--success)';
        else if (state.currentAtten > -12) els.outRsl.style.color = 'var(--warning)';
        else els.outRsl.style.color = 'var(--danger)';

        let now = Date.now();
        if (now - lastChartUpdate > 100 && rslChart) {
            const mode = els.graphMode.value;
            let currentX = mode === 'azimuth' ? state.calibrated.az : state.calibrated.el;
            let currentY = Math.max(rsl, -100);

            // Only plot points that fall within the 80 to 100 chart boundaries
            if (currentX >= 80 && currentX <= 100) {
                historyAz.push({ x: state.calibrated.az, y: currentY });
                historyEl.push({ x: state.calibrated.el, y: currentY });

                if (historyAz.length > MAX_HISTORY) historyAz.shift();
                if (historyEl.length > MAX_HISTORY) historyEl.shift();
            }

            rslChart.data.datasets[1].data = [{ x: currentX, y: currentY }];
            rslChart.update();
            lastChartUpdate = now;
        }
    }

    function handleOrientation(event) {
        // Feed raw, erratic data into the vector stabilizer
        const stable = getStableAngles(event.alpha, event.beta, event.gamma);
        state.raw.az = stable.az;
        state.raw.el = stable.el;
        updateDashboard();
    }

    // --- Controls ---
    els.btnPermissions.addEventListener('click', () => {
        try {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response === 'granted') startSensors();
                    else alert("Gyro permission denied.");
                }).catch(err => alert("Error: " + err.message));
            } else { startSensors(); }
        } catch (e) { alert("System Error: " + e.message); }
    });

    function startSensors() {
        state.sensorsActive = true;
        
        if (state.isFirstStart) {
            setRandomTargets();
            initChart();
            updateChartDisplayMode();
            state.isFirstStart = false;
        }

        window.addEventListener('deviceorientation', handleOrientation, true);
        els.btnPermissions.style.display = 'none';
        els.btnRandomizeTarget.style.display = 'block';
        els.dashboard.style.display = 'grid';
    }

    els.btnStop.addEventListener('click', () => {
        state.sensorsActive = false;
        window.removeEventListener('deviceorientation', handleOrientation, true);
        els.btnPermissions.style.display = 'block';
        els.btnPermissions.textContent = "Resume Sensors";
        els.btnRandomizeTarget.style.display = 'none';
    });

    els.btnZero.addEventListener('click', () => {
        state.offsets.az = normalizeAz(90.0 - state.raw.az);
        state.offsets.el = normalizeAz(90.0 - state.raw.el);
        clearGraphHistory();
        updateDashboard();
    });

    els.btnRandomizeTarget.addEventListener('click', setRandomTargets);
    els.graphMode.addEventListener('change', updateChartDisplayMode);
    els.btnClearGraph.addEventListener('click', clearGraphHistory); 

</script>
</body>
</html>
